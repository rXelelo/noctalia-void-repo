name: Build Git and publish
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/void-linux/void-glibc-full
      options: --privileged
      volumes:
        - /dev:/dev
    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu
          xbps-install -y sudo bash curl git libstdc++
          useradd -G xbuilder -M builder

      - name: Checkout
        uses: classabbyamp/treeless-checkout-action@v1

      - name: Find -git packages
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PKGS=$(ls srcpkgs/ | grep -- '-git$' | tr '\n' ' ')
          else
            PKGS=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} \
              | grep '^srcpkgs/' \
              | cut -d'/' -f2 \
              | grep -- '-git$' \
              | sort -u \
              | tr '\n' ' ')
            # Fall back to all -git packages on schedule
            if [ "${{ github.event_name }}" = "schedule" ]; then
              PKGS=$(ls srcpkgs/ | grep -- '-git$' | tr '\n' ' ')
            fi
          fi
          echo "packages=$PKGS" >> $GITHUB_OUTPUT
          echo "Changed -git packages: $PKGS"

      - name: Setup void-packages
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages
          cp -r srcpkgs/* void-packages/srcpkgs/
          chown -R builder:builder void-packages

      - name: Prepare masterdir
        run: |
          cd void-packages
          echo XBPS_BUILD_ENVIRONMENT=void-packages-ci >> etc/conf
          echo XBPS_CHROOT_CMD=uchroot >> etc/conf
          echo XBPS_ALLOW_RESTRICTED=yes >> etc/conf
          sudo -Eu builder ./xbps-src binary-bootstrap
          sudo -Eu builder xbps-install -r masterdir-x86_64 -S jq curl -y

      - name: Build -git packages
        run: |
          for pkg in ${{ steps.changed.outputs.packages }}; do
            echo "=> Building $pkg"
            sudo -Eu builder sh -c "cd void-packages && ./xbps-src -E pkg $pkg"
          done
          # Record exactly what was just built (used by cleanup step)
          ls void-packages/hostdir/binpkgs/*.xbps | xargs -n1 basename > /tmp/latest.list
          echo "=> Built packages:"
          cat /tmp/latest.list

      - name: Clone Codeberg pages repo
        run: |
          # Try to clone pages branch directly
          if git clone --depth=1 --branch pages \
            https://oauth2:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/${{ secrets.CODEBERG_USER }}/${{ secrets.CODEBERG_REPO }}.git \
            /tmp/codeberg-repo; then
            echo "=> Cloned pages branch successfully"
          else
            echo "=> pages branch clone failed, initializing fresh"
            mkdir -p /tmp/codeberg-repo
            cd /tmp/codeberg-repo
            git init
            git remote add origin https://oauth2:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/${{ secrets.CODEBERG_USER }}/${{ secrets.CODEBERG_REPO }}.git
            git checkout --orphan pages
          fi

      - name: Merge new packages into repo
        run: |
          REPO_DIR=/tmp/codeberg-repo

          # Copy newly built packages
          cp void-packages/hostdir/binpkgs/*.xbps $REPO_DIR/
          cp void-packages/hostdir/binpkgs/*.sig2 $REPO_DIR/ 2>/dev/null || true

          cd $REPO_DIR

          # Remove old versions of newly built packages
          while read newly_built; do
            pkg_base=$(echo "$newly_built" | sed 's/-[0-9].*//')
            echo "=> Cleaning old versions of: $pkg_base"
            for file in $(ls *.xbps 2>/dev/null | grep "^${pkg_base}-[0-9]"); do
              [ "$file" = "$newly_built" ] && continue
              echo "   Removing: $file"
              rm -f "$file" "${file}.sig2"
            done
          done < /tmp/latest.list

          echo "=> Final package count: $(ls *.xbps 2>/dev/null | wc -l)"

      - name: Sign and re-index repo
        run: |
          echo "${{ secrets.XBPS_PRIVATE_KEY }}" > /tmp/privkey.pem
          openssl rsa -in /tmp/privkey.pem -out /tmp/privkey_rsa.pem

          cd /tmp/codeberg-repo
          rm *.xbps.sig2
          xbps-rindex --sign-pkg --signedby "Rain Xelelo" \
            --privkey /tmp/privkey_rsa.pem *.xbps
          xbps-rindex -a *.xbps
          xbps-rindex --sign --signedby "Rain Xelelo" \
            --privkey /tmp/privkey_rsa.pem .

          rm /tmp/privkey.pem /tmp/privkey_rsa.pem

      - name: Generate index.html
        run: |
          REPO_DIR=/tmp/codeberg-repo
          cat > "$REPO_DIR/index.html" << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <title>void-repo</title>
            <style>
              body { font-family: monospace; background: #fff; color: #000; margin: 20px; }
              h1 { font-size: 1.2em; }
              hr { border: 1px solid #000; }
              table { width: 100%; border-collapse: collapse; }
              td { padding: 2px 10px; white-space: nowrap; }
              td:last-child { text-align: right; }
              a { color: #00e; }
              a:visited { color: #551a8b; }
            </style>
          </head>
          <body>
          <h1>Index /</h1>
          <hr>
          <table>
            <tr><td><a href="../">../</a></td><td></td><td>-</td></tr>
          EOF

          for f in "$REPO_DIR"/*; do
            [ -f "$f" ] || continue
            fname=$(basename "$f")
            fdate=$(date -r "$f" "+%d-%b-%Y %H:%M")
            fsize=$(stat -c%s "$f")
            echo "  <tr><td><a href=\"$fname\">$fname</a></td><td>$fdate</td><td>$fsize</td></tr>" >> "$REPO_DIR/index.html"
          done

          cat >> "$REPO_DIR/index.html" << 'EOF'
          </table>
          <hr>
          </body>
          </html>
          EOF

      - name: Push to Codeberg pages branch
        run: |
          cd /tmp/codeberg-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "repo: update packages $(date '+%Y-%m-%d %H:%M:%S')" || echo "Nothing to commit"
          git push --force origin pages
