name: Build and publish packages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/void-linux/void-glibc-full
      options: --privileged
      volumes:
        - /dev:/dev

    steps:
      - name: Prepare container
        run: |
          mkdir -p /etc/xbps.d && cp /usr/share/xbps.d/*-repository-*.conf /etc/xbps.d/
          sed -i 's|repo-default|repo-ci|g' /etc/xbps.d/*-repository-*.conf
          xbps-install -Syu xbps && xbps-install -yu
          xbps-install -y sudo bash curl git libstdc++
          useradd -G xbuilder -M builder

      - name: Checkout
        uses: classabbyamp/treeless-checkout-action@v1

      - name: Setup void-packages
        run: |
          git clone --depth=1 https://github.com/void-linux/void-packages
          cp -r srcpkgs/* void-packages/srcpkgs/
          chown -R builder:builder void-packages

      - name: Prepare masterdir
        run: |
          cd void-packages
          echo XBPS_BUILD_ENVIRONMENT=void-packages-ci >> etc/conf
          echo XBPS_CHROOT_CMD=uchroot >> etc/conf
          sudo -Eu builder ./xbps-src binary-bootstrap

      - name: Build noctalia-qs
        run: sudo -Eu builder sh -c "cd void-packages && ./xbps-src pkg noctalia-qs"

      - name: Build noctalia-shell
        run: sudo -Eu builder sh -c "cd void-packages && ./xbps-src pkg noctalia-shell"

      - name: Sign and index repo
        env:
          PRIVATE_KEY: ${{ secrets.XBPS_PRIVATE_KEY }}
        run: |
          echo "$PRIVATE_KEY" > /tmp/privkey.pem
          chmod 600 /tmp/privkey.pem
          xbps-rindex -a void-packages/hostdir/binpkgs/*.xbps
          xbps-rindex --sign --signedby "Rain Xelelo" \
            --privkey /tmp/privkey.pem void-packages/hostdir/binpkgs
          rm /tmp/privkey.pem

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: void-packages/hostdir/binpkgs
